<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 My To-Do List</h1>
            <p class="subtitle">Manage your tasks efficiently</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>

            <!-- To-Do List -->
            <div class="todos-section">
                <ul id="todoList" class="todo-list">
                    <!-- Todos will be added here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>📭 No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="action-btn clear-btn">
                    🗑️ Clear Completed
                </button>
                <button id="clearAllBtn" class="action-btn delete-all-btn">
                    ⚠️ Clear All
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>✨ Your tasks are automatically saved to local storage</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
